name: CI Build and Release

on:
  push:
    tags:
      - 'v*'      # Releases
      - 'test-v*' # Betas

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up PowerShell
        shell: pwsh
        run: echo "Using PowerShell $PSVersionTable.PSVersion"

      - name: Compile and Package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:GITHUB_WORKSPACE
          
          # --- VERSIONING ---
          $rawTag = "${{ github.ref_name }}"
          # Clean tag (e.g., "v1.2.3" -> "1.2.3.0")
          $version = ($rawTag -replace '^(test-)?v', '') 
          # Ensure it has 4 parts for Windows (1.2 -> 1.2.0.0)
          while ($version.Split('.').Count -lt 4) { $version += ".0" }
          
          Write-Host ":: Injecting Version: $version"
          
          # --- INJECT VERSION INTO Nexus.ahk ---
          $scriptPath = Join-Path $root "Nexus"
          $content = Get-Content $scriptPath -Raw
          
          # This regex finds ";@Ahk2Exe-SetFileVersion ..." and replaces the number
          $content = $content -replace ';@Ahk2Exe-SetFileVersion\s+.*', ";@Ahk2Exe-SetFileVersion  $version"
          $content = $content -replace ';@Ahk2Exe-SetProductVersion\s+.*', ";@Ahk2Exe-SetProductVersion $version"
          
          Set-Content -Path $scriptPath -Value $content
          
          # --- PATHS ---
          $compiler = Join-Path $root "ahk\Compiler\Ahk2Exe.exe"
          $baseBin  = Join-Path $root "ahk\Compiler\Unicode-64-bit.bin"
          $output   = Join-Path $root "GameManagerLite.exe" 
          $icon     = Join-Path $root "media\nexus.ico"
          
          # --- COMPILE ---
          Write-Host ":: Compiling..."
          $cmd = Start-Process -FilePath $compiler `
            -ArgumentList "/in `"$scriptPath`" /out `"$output`" /icon `"$icon`" /base `"$baseBin`" /silent" `
            -NoNewWindow -PassThru -Wait
          
          if ($cmd.ExitCode -ne 0) { throw "Compilation failed!" }
            
            # ... (Rest of the script remains the same) ...

          # --- STAGING ---
          $stagingName = "GameManagerLite-v$version"
          $stagingDir  = Join-Path $root "build_staging\$stagingName"
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          # --- COPY ARTIFACTS ---
          Move-Item $output -Destination $stagingDir -Force
          
          # Copy Dependencies
          $foldersToCopy = @("media", "core") 
          foreach ($dir in $foldersToCopy) {
            $src = Join-Path $root $dir
            if (Test-Path $src) { Copy-Item $src -Destination $stagingDir -Recurse -Force }
          }

          $filesToCopy = @("README.txt", "LICENSE", "nexus.ini")
          foreach ($file in $filesToCopy) {
            $src = Join-Path $root $file
            if (Test-Path $src) { Copy-Item $src -Destination $stagingDir -Force }
          }

          # --- ZIP ---
          $zipName = "GameManagerLite-v$version.zip"
          $zipPath = Join-Path $root $zipName
          Compress-Archive -Path "$stagingDir\*" -DestinationPath $zipPath -Force
          
          # Optional: Expose standalone EXE for release
          $versionedExe = "GameManagerLite-v$version.exe"
          Copy-Item (Join-Path $stagingDir "GameManagerLite.exe") -Destination (Join-Path $root $versionedExe)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GameManagerLite-v*.exe
            GameManagerLite-v*.zip
          prerelease: ${{ startsWith(github.ref_name, 'test-v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
